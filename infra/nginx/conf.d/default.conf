# Redirect all plain HTTP to HTTPS
server {
  listen 80;
  server_name app.northeastwatch.example;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name app.northeastwatch.example;

  # Replace with real certificates (Let's Encrypt via certbot, or your CA).
  # See docs/DEPLOYMENT.md for the certbot renewal setup.
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # -------- API --------
  location /api/ {
    limit_req zone=api_general burst=40 nodelay;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
  }

  location /api/auth/ {
    limit_req zone=api_auth burst=10 nodelay;
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # -------- WebSocket (live alert stream) --------
  location /ws {
    proxy_pass http://api_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s; # long-lived connections
  }

  # -------- health check passthrough (used by external uptime monitors) --------
  location /health/ {
    proxy_pass http://api_backend;
    access_log off;
  }

  # -------- static frontend (React SPA build output) --------
  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html; # SPA fallback for client-side routing
    add_header Cache-Control "no-cache"; # index.html itself should always revalidate
  }
}
