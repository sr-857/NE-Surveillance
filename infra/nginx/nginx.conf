user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ---- logging ----
  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
    '"request":"$request","status":$status,"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,"upstream_response_time":"$upstream_response_time",'
    '"request_id":"$request_id","user_agent":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json_combined;
  error_log /var/log/nginx/error.log warn;

  # ---- performance ----
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  client_max_body_size 1m;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 512;
  gzip_types text/plain text/css application/json application/javascript text/xml
    application/xml application/xml+rss text/javascript image/svg+xml;

  # ---- rate limiting at the edge (defense in depth; the app also rate-limits) ----
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
  limit_req_status 429;

  # ---- upstream: API replicas, load-balanced ----
  # `least_conn` sends each request to the replica with the fewest active
  # connections — better than round-robin when request cost varies (e.g.
  # an export/report request vs a simple health check).
  #
  # NOTE: this static `upstream` block resolves `api` once at Nginx startup.
  # With `docker compose --scale api=N`, Compose's embedded DNS *does* return
  # all N replica IPs, but Nginx won't pick up replicas added/removed after
  # startup without a reload. That's fine for a small, mostly-static fleet;
  # for real elastic autoscaling, put a proper orchestrator (Kubernetes
  # Service, ECS target group, or a service mesh) in front instead — see
  # docs/DEPLOYMENT.md "Beyond docker-compose" section.
  upstream api_backend {
    least_conn;
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 64;
  }

  include /etc/nginx/conf.d/*.conf;
}
