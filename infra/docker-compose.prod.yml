version: "3.9"

# Production overlay. Deploy with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --scale api=3
#
# In a real multi-host deployment, replace this with your orchestrator of
# choice (Kubernetes/ECS/Nomad) — this compose file demonstrates the same
# horizontal-scaling shape (N stateless API replicas behind a load balancer,
# shared Postgres + Redis) for a single-host or small deployment.

services:
  postgres:
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/backup-scripts:/backup-scripts:ro

  redis:
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    deploy:
      resources:
        limits: { cpus: "1", memory: 768M }

  api:
    environment:
      NODE_ENV: production
    deploy:
      replicas: 3
      resources:
        limits: { cpus: "1", memory: 512M }
      restart_policy:
        condition: on-failure
        max_attempts: 5
    ports: []  # not exposed directly in prod — only Nginx is public-facing

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

volumes:
  pgdata:
